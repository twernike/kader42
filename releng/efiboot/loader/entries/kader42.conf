title   Kader42 – Live System (Default)
sort-key 00
linux   /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
# ZUERST die Microcodes (Wichtig!)
initrd  /%INSTALL_DIR%/boot/intel-ucode.img
initrd  /%INSTALL_DIR%/boot/amd-ucode.img
# DANN erst die eigentliche initramfs
initrd  /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
# OPTIMIERT: ibt=off für 13. Gen Intel und i915.modeset für die VM
# options rw archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% ibt=off i915.modeset=1 loglevel=3 rd.udev.log_priority=3 vt.global_cursor_default=0 video=efifb:off quiet splash
# options archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% quiet splash plymouth.ignore-serial-consoles

# console=tty2 => Redirect console text to the second terminal so that no text is displayed during bootup. This allows Plymouth to show the splash screen without interference from boot messages.
# options archisobasedir=%INSTALL_DIR% archisolabel=kader42_mello loglevel=3 rd.systemd.show_status=false rd.udev.log_level=3 rd.udev.log_priority=3 vt.global_cursor_default=0 cow_spacesize=10G copytoram=n module_blacklist=pcspkr nvme_load=yes i915.enable_psr=0 intel_idle.max_cstate=4 quiet intel_fastboot=1 i915.fastboot=1 systemd.show_status=false fsck.repair=yes plymouth.enable=1 plymouth.ignore-serial-consoles fbcon=nodefer enable_fbc=1 plymouth.nokeep splash console=tty2 consoleblank=1 i915.enable_psr=0
# options archisobasedir=%INSTALL_DIR% archisolabel=kader42_mello loglevel=3 rd.systemd.show_status=false rd.udev.log_level=3 rd.udev.log_priority=3 vt.global_cursor_default=0 cow_spacesize=10G copytoram=n module_blacklist=pcspkr nvme_load=yes i915.enable_psr=0 intel_idle.max_cstate=4 quiet intel_fastboot=1 i915.fastboot=1 systemd.show_status=false fsck.repair=yes enable_fbc=1 console=tty1 i915.enable_psr=0 systemd.show_status=true systemd.log_target=console systemd.log_location=tty2 console=tty2 consoleblank=1
options archisobasedir=%INSTALL_DIR% archisolabel=kader42_mello loglevel=3 rd.systemd.show_status=false rd.udev.log_level=3 rd.udev.log_priority=3 vt.global_cursor_default=0 cow_spacesize=10G copytoram=n module_blacklist=pcspkr nvme_load=yes i915.enable_psr=0 intel_idle.max_cstate=4 quiet intel_fastboot=1 i915.fastboot=1 systemd.show_status=false fsck.repair=yes fbcon=nodefer enable_fbc=1 console=tty2 consoleblank=1 i915.enable_psr=0
