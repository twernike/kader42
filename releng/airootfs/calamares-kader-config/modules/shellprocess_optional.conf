# shellprocess_optional.conf

# Definiert den Job-Typ und globale Einstellungen
dontChroot: true
timeout: 600

# 1. Das auszuführende Skript definieren
script: /usr/share/calamares/scripts/install_optional_packages.sh

# 2. Die Argumente, die Calamares dem Skript als $1, $2, $3... übergibt
arguments:
    # Der Wert der Variable ${google-chrome} (true/false) wird ausgelesen
    # | cut -c 1 schneidet den String auf das erste Zeichen (t oder f)
    # Das Skript erhält "t" als $1
    - ${google-chrome} | cut -c 1  
    
    # Das Skript erhält "t" als $2
    - ${visual-studio-code-bin} | cut -c 1
    
    # ... und so weiter für alle Ihre Pakete ...
    - ${heroic-games-launcher-bin} | cut -c 1
    - ${waydroid-git} | cut -c 1
    - ${waydroid-helper} | cut -c 1
    - ${waydroid-launcher-git} | cut -c 1
    - ${spotify} | cut -c 1

# 3. Das i18n-Feld bleibt unverändert für die Anzeige
i18n:
  name: "Install optional packages"
  name[de]: "Installiere optionale Pakete"
  name[nl]: "Installeer optionele pakketten"