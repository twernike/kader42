[Unit]
# Wir warten, bis Plymouth gestartet ist, aber wir blockieren nicht
After=plymouth-start.service
# WICHTIG: Das Conflicts entfernen wir testweise, damit Systemd Plymouth 
# nicht hart abschießt, bevor SDDM loslegt.
# Conflicts=plymouth-quit.service 

[Service]
# Schritt 1: Plymouth sagen, es soll Platz machen, aber das Bild halten
ExecStartPre=-/usr/bin/plymouth quit --retain-splash
# Schritt 2: Ein winziger Moment für den Treiber-Handover (nur 0.2s statt 1.5s)
ExecStartPre=-/usr/bin/sleep 0.2
# Schritt 3: Nur falls Plymouth noch als Geist rumspukt, räumen wir auf
ExecStartPost=-/usr/bin/sh -c "/usr/bin/plymouth terminate || /usr/bin/killall -q plymouthd || true"