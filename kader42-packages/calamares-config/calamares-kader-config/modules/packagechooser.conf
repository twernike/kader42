# packagechooser.conf - ANGEPASST FÜR NETINSTALL
---
# netinstall erwartet groupsUrl, um zu wissen, woher die Pakete kommen.
groupsUrl: local 

label:
    sidebar: "Optional software packages"
    sidebar[de]: "Optionale Software"
    sidebar[nl]: "Optionele software"

# Wenn groupsUrl auf 'local' steht, werden die Gruppen aus dieser Datei geladen.
groups:
    # 1. GOOGLE CHROME (AUR/Extern)
    # Wir nutzen eine leere packages-Liste, da die Installation über Ihr Skript erfolgt.
    # Die 'id' ist entscheidend, um die Variable ${chrome} im Global Storage zu setzen.
  - name: "Google Chrome"
    description[de]: "Google Browser."
    description: "Google Browser."
    selected: false
    id: google-chrome # <-- Die Variable, die im shellprocess_optional.conf ausgelesen wird
    packages: [ ] 
        
    # 2. VISUAL STUDIO CODE (AUR/Extern)
  - name: "Visual Studio Code"
    description: "Editor for building and debugging applications (official binary version)."
    description[de]: "Visual Studio Code (vscode): Editor zum Erstellen und Debuggen von Anwendungen (offizielle Binärversion)."
    selected: false
    id: visual-studio-code-bin # <-- Die Variable, die im shellprocess_optional.conf ausgelesen wird
    packages: [ ] 

