# Konfiguration für packagechooserq
# Wir nutzen method: legacy, damit wir einfache Strings (IDs) bekommen.
method: legacy

# Überschriften für die Seite
labels:
    step: "Optional Software"
    step[de]: "Optionale Software"

# Hier definieren wir die Liste der Checkboxen
items:
    - id: chrome
      # Der Name des Pakets
      name: "Google Chrome"
      # Beschreibung EN (Standard) mit Lizenz-Link
      description: "The official web browser from Google.<br/><br/><i>By checking this box, you agree to the <a href='https://www.google.com/chrome/terms/'>Google Chrome Terms of Service</a>.</i>"
      # Beschreibung DE mit Lizenz-Link
      description[de]: "Der offizielle Webbrowser von Google.<br/><br/><i>Mit der Auswahl stimmen Sie den <a href='https://www.google.com/chrome/terms/'>Google Nutzungsbedingungen</a> zu.</i>"
      
      # Optional: Bild anzeigen (Pfad relativ zum Branding oder absolut)
      screenshot: "/usr/share/icons/google_chrome.svg"
      selected: false

    - id: vscode
      name: "Visual Studio Code"
      # Beschreibung EN
      description: "Code editor redefined and optimized for building and debugging modern web and cloud applications.<br/><br/><i>By checking this box, you agree to the <a href='https://code.visualstudio.com/license'>Microsoft License Terms</a>.</i>"
      # Beschreibung DE
      description[de]: "Ein Code-Editor, optimiert für das Erstellen und Debuggen moderner Web- und Cloud-Anwendungen.<br/><br/><i>Mit der Auswahl stimmen Sie den <a href='https://code.visualstudio.com/license'>Microsoft Lizenzbedingungen</a> zu.</i>"
      screenshot: "/usr/share/icons/vscode.svg"
      selected: false